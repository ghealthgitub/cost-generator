<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — Ginger Universe</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,#0B2545 0%,#13315C 50%,#0E4D6B 100%)}
        .reset-card{background:white;border-radius:16px;padding:36px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
        .logo{width:48px;height:48px;border-radius:12px;overflow:hidden;margin-bottom:20px}
        .logo img{width:100%;height:100%;object-fit:cover}
        h2{font-family:'Playfair Display',serif;font-size:24px;color:#0B2545;margin-bottom:4px}
        .subtitle{color:#6B7280;font-size:14px;margin-bottom:24px}
        .form-group{margin-bottom:16px}
        .form-group label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px}
        .form-group input{width:100%;padding:11px 14px;border:2px solid #E5E7EB;border-radius:8px;font-size:14px;font-family:inherit;transition:border-color .2s}
        .form-group input:focus{outline:none;border-color:#0EA5A0;box-shadow:0 0 0 3px rgba(14,165,160,.1)}
        .error-msg{background:#FEE2E2;color:#991B1B;padding:10px 14px;border-radius:8px;margin-bottom:16px;font-size:13px;border:1px solid #FECACA}
        .success-msg{background:#ECFDF5;color:#065F46;padding:10px 14px;border-radius:8px;margin-bottom:16px;font-size:13px;border:1px solid #A7F3D0}
        .btn{width:100%;padding:12px;background:linear-gradient(135deg,#0B2545,#13315C);color:white;border:none;border-radius:8px;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .2s}
        .btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(11,37,69,.3)}
        .back-link{display:block;text-align:center;margin-top:20px;font-size:13px;color:#6B7280}
        .back-link a{color:#0EA5A0;text-decoration:none}
        .back-link a:hover{text-decoration:underline}
        .hint{font-size:11px;color:#9CA3AF;margin-top:4px}
    </style>
</head>
<body>
    <div class="reset-card">
        <div class="logo"><img src="/static/logo.png" alt="Ginger"></div>
        <h2>Reset Password</h2>
        <div class="subtitle">Enter your email, the reset key, and a new password.</div>

        {% if error %}
            <div class="error-msg">{{ error }}</div>
        {% endif %}
        {% if success %}
            <div class="success-msg">{{ success }}</div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="you@ginger.healthcare">
            </div>
            <div class="form-group">
                <label for="secret">Reset Key</label>
                <input type="password" id="secret" name="secret" required placeholder="Enter the reset secret key">
                <div class="hint">This is the RESET_SECRET set in your Render environment variables.</div>
            </div>
            <div class="form-group">
                <label for="new_password">New Password</label>
                <input type="password" id="new_password" name="new_password" required minlength="6" placeholder="Minimum 6 characters">
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required minlength="6" placeholder="Re-enter new password">
            </div>
            <button type="submit" class="btn">Reset Password</button>
        </form>

        <div class="back-link"><a href="/login">← Back to Login</a></div>
    </div>
</body>
</html>
